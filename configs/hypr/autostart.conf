#################
### AUTOSTART ###
#################

# Critical System Services
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP=Hyprland
exec-once = /usr/libexec/polkit-gnome-authentication-agent-1
exec-once = kdeconnect-indicator

# Theme & Aesthetic (Marchborn Guardian)
exec-once = hyprctl setcursor Bibata-Modern-Classic 24
exec-once = noctalia-shell


# Workspace-Specific Favorites
exec-once = [workspace 2] sleep 3 && zed
exec-once = [workspace 3] sleep 4 && steam
exec-once = [workspace 4] sleep 2 && floorp
exec-once = [workspace 5] sleep 2 && kitty -e btop
